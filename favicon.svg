<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#7209b7"/>
      <stop offset="100%" stop-color="#4895ef"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Dancing figure silhouette (simplified, on the left side) -->
  <!-- Head -->
  <circle cx="195" cy="140" r="28" fill="rgba(255,255,255,0.9)"/>
  <!-- Body -->
  <line x1="195" y1="168" x2="195" y2="260" stroke="rgba(255,255,255,0.9)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left arm raised up -->
  <line x1="195" y1="200" x2="155" y2="155" stroke="rgba(255,255,255,0.9)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right arm out -->
  <line x1="195" y1="200" x2="240" y2="180" stroke="rgba(255,255,255,0.9)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="195" y1="260" x2="155" y2="340" stroke="rgba(255,255,255,0.9)" stroke-width="13" stroke-linecap="round"/>
  <!-- Right leg kicked out -->
  <line x1="195" y1="260" x2="245" y2="330" stroke="rgba(255,255,255,0.9)" stroke-width="13" stroke-linecap="round"/>

  <!-- Play button triangle -->
  <polygon points="280,180 280,360 400,270" fill="rgba(255,255,255,0.95)"/>

  <!-- Motion/energy lines -->
  <line x1="130" y1="130" x2="110" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="140" y1="115" x2="130" y2="90" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="110" x2="158" y2="85" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>

  <!-- Subtle rhythm dots -->
  <circle cx="120" cy="370" r="6" fill="rgba(255,255,255,0.25)"/>
  <circle cx="145" cy="385" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="170" cy="375" r="5" fill="rgba(255,255,255,0.22)"/>
</svg>
