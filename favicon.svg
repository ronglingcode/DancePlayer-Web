<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#7209b7"/>
      <stop offset="100%" stop-color="#4895ef"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Abstract dancer — one single continuous stroke
       Flows: raised fingertip → arm → head loop → torso → splits into two leg curves
       Like a calligrapher drawing a dancer in one breath -->
  <path d="M105,130
           C120,120 145,115 165,125
           C180,132 188,145 190,160
           C192,172 188,178 180,178
           C172,178 168,168 170,158
           C172,148 178,140 185,142
           C195,146 198,165 195,185
           C190,215 185,250 178,280
           C170,310 155,345 130,380"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Second stroke: from torso, the other leg sweeps outward -->
  <path d="M182,265
           C200,285 225,310 255,340
           C270,355 280,360 285,352"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="10" stroke-linecap="round"/>

  <!-- Play button -->
  <path d="M330,200 C330,195 332,192 337,192 L410,250 C416,254 416,262 410,266 L337,324 C332,324 330,321 330,316 Z"
        fill="rgba(255,255,255,0.92)"/>
</svg>
